name: Review Agent (shared)

# Reusable workflow that provides PR code review (including approval /
# request-changes) via Claude Code.
#
# Two modes, selected by the `mode` input:
#
#   mode: auto      - Standard pull_request-triggered review. Runs the
#                     PR-author-is-bot skip check and diff-hash dedupe.
#                     May exit early without reviewing.
#
#   mode: requested - Human-initiated re-review (typically triggered by
#                     pull_request_review_comment). Skips all dedupe,
#                     always runs, embeds github.event.comment.body as
#                     reviewer special instructions in the prompt.
#
# USAGE
#
# Standard pull_request review (in the consumer repo):
#
#   name: Review Agent
#   on:
#     pull_request:
#       types: [opened, synchronize, ready_for_review, reopened]
#   jobs:
#     review:
#       uses: mkmba-nz/github-infra/.github/workflows/review-agent.yml@v1
#       secrets: inherit
#
# Human-requested re-review on @-mention:
#
#   name: Review Agent (Re-review)
#   on:
#     pull_request_review_comment:
#       types: [created]
#   jobs:
#     rereview:
#       if: |
#         !contains(github.event.pull_request.labels.*.name, 'skip-workflows') &&
#         (contains(github.event.comment.body, '@mkmba-review-agent') ||
#          contains(github.event.comment.body, '@review-agent')) &&
#         contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
#       uses: mkmba-nz/github-infra/.github/workflows/review-agent.yml@v1
#       secrets: inherit
#       with:
#         mode: requested
#
# The author_association check restricts triggering to repo members and
# collaborators. This is essential in public repos - any logged-in user
# can comment on a public PR, and the comment body is interpolated into
# the prompt, so an outsider could otherwise inject instructions into
# the review bot.
#
# bot-id and bot-name default to the org-wide mkmba-review-agent App, so
# consumers don't normally need a `with:` block beyond `mode` for requested
# re-reviews.
#
# REQUIRED SECRETS (the consumer repo must define these, or inherit them):
#
#   TS_OAUTH_CLIENT_ID, TS_AUDIENCE
#     Tailscale OIDC credentials used to reach the llmux Anthropic gateway.
#   REVIEW_AGENT_APP_ID, REVIEW_AGENT_PRIVATE_KEY
#     Credentials for the GitHub App that posts the review.
#
# CONVENTIONS this workflow relies on:
#
#   - All other review-agent bots in the org have logins ending in "-agent"
#     (so the human-reviewer detection can exclude them with a single test).
#   - The review bot's GraphQL author.login is the App slug without "[bot]"
#     (GraphQL renders Bot actor logins this way) - we derive the slug from
#     the [bot]-suffixed name passed in `bot-name`.

on:
  workflow_call:
    inputs:
      mode:
        description: |
          'auto' (default): pull_request-triggered review with skip/dedupe.
          'requested': human-initiated re-review, skips checks, embeds the
          triggering comment body as reviewer special instructions.
        required: false
        type: string
        default: auto
      bot-id:
        description: Numeric GitHub App user ID of the review bot. Defaults to the org-wide mkmba-review-agent App.
        required: false
        type: string
        default: "2798759"
      bot-name:
        description: GitHub App user login including the [bot] suffix. Defaults to the org-wide mkmba-review-agent App.
        required: false
        type: string
        default: "mkmba-review-agent[bot]"
      claude-code-action-ref:
        description: Pinned ref of anthropics/claude-code-action
        required: false
        type: string
        default: v1.0.112
      anthropic-base-url:
        description: |
          Base URL for the Claude API gateway. Leave blank to use the
          anthropics/claude-code-action default (public Anthropic API).          
        required: false
        type: string
        default: ""
      extra-instructions:
        description: |
          Repo-specific instructions appended verbatim to the end of the
          review prompt. Use for guidance the shared prompt does not cover
          (e.g. "Pay extra attention to schema migrations - this repo runs
          them automatically on deploy.").
        required: false
        type: string
        default: ""
    secrets:
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_AUDIENCE:
        required: true
      REVIEW_AGENT_APP_ID:
        required: true
      REVIEW_AGENT_PRIVATE_KEY:
        required: true

# Shared by both modes - prevents review and re-review from racing on the
# same PR. Rapid-fire @-mentions in requested mode also cancel earlier
# re-reviews, so the latest reviewer instructions win.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest    
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for diff against base
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute diff hash
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          DIFF_HASH=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD | sha256sum | cut -d' ' -f1)
          echo "diff_hash=$DIFF_HASH" >> $GITHUB_OUTPUT
          echo "::notice::Computed diff-hash:$DIFF_HASH"

      - name: Decide whether to review
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          BOT_NAME: ${{ inputs.bot-name }}
          MODE: ${{ inputs.mode }}
          DIFF_HASH: ${{ steps.diff.outputs.diff_hash }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          # GraphQL author.login for Bot actors is the App slug without "[bot]"
          BOT_SLUG="${BOT_NAME%\[bot\]}"

          if [[ "$MODE" == "requested" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "is_rereview=true" >> $GITHUB_OUTPUT
            echo "::notice::mode=requested - running unconditionally"
            exit 0
          fi

          # mode=auto: skip if PR author is a bot AND a human has reviewed
          # since the last bot approval (defer to the active human).
          if [[ "$PR_AUTHOR_TYPE" == "Bot" ]]; then
            REVIEWS=$(gh pr view "$PR_NUMBER" --json reviews --jq '.reviews')
            LAST_APPROVAL_TIME=$(echo "$REVIEWS" | jq -r --arg bot "$BOT_SLUG" '
              [.[] | select(.author.login == $bot) | select(.state == "APPROVED") | .submittedAt]
              | sort | last // empty')
            if [[ -n "$LAST_APPROVAL_TIME" ]]; then
              # Any reviewer whose login does not end in "-agent" counts as human.
              HUMAN_REVIEWS_AFTER=$(echo "$REVIEWS" | jq --arg t "$LAST_APPROVAL_TIME" '
                [.[] | select(.author.login | test("-agent$") | not) | select(.submittedAt > $t)]
                | length')
              if [[ "${HUMAN_REVIEWS_AFTER:-0}" -gt 0 ]]; then
                echo "should_run=false" >> $GITHUB_OUTPUT
                echo "::notice::Skipping - human reviewer active since agent approval at $LAST_APPROVAL_TIME"
                exit 0
              fi
            fi
          fi

          # mode=auto: dedupe by diff hash against prior bot comments.
          BOT_COMMENTS=$(gh pr view "$PR_NUMBER" --json comments \
            --jq --arg bot "$BOT_SLUG" '.comments[] | select(.author.login == $bot) | .body' || true)
          EXACT_MATCH=$(echo "$BOT_COMMENTS" | grep "diff-hash:$DIFF_HASH" | tail -1 || true)
          PREVIOUS_HASH=$(echo "$BOT_COMMENTS" | grep -oP 'diff-hash:\K[a-f0-9]{64}' | tail -1 || true)

          if [[ -n "$EXACT_MATCH" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping - diff-hash:$DIFF_HASH was already reviewed"
          elif [[ -n "$PREVIOUS_HASH" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "is_rereview=true" >> $GITHUB_OUTPUT
            echo "::notice::Re-review - previous was diff-hash:$PREVIOUS_HASH, now diff-hash:$DIFF_HASH"
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "is_rereview=false" >> $GITHUB_OUTPUT
            echo "::notice::First review for diff-hash:$DIFF_HASH"
          fi

      - name: Tailscale
        if: steps.decide.outputs.should_run == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:github

      - name: Generate GitHub App token
        if: steps.decide.outputs.should_run == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REVIEW_AGENT_APP_ID }}
          private-key: ${{ secrets.REVIEW_AGENT_PRIVATE_KEY }}

      - name: Review Agent
        if: steps.decide.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@${{ inputs.claude-code-action-ref }}
        env:
          ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
          ANTHROPIC_AUTH_TOKEN: "${{ github.job }}-${{ github.repository }}"
        with:
          anthropic_api_key: x   # Uses env config above
          github_token: ${{ steps.app-token.outputs.token }}
          bot_id: ${{ inputs.bot-id }}
          bot_name: ${{ inputs.bot-name }}
          allowed_bots: "*"      # Allow other agents (GitHub Apps) to trigger this

          # Enable progress tracking
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            ${{ steps.decide.outputs.is_rereview == 'true' && 'RE-REVIEW: This PR was previously reviewed. Focus ONLY on what has CHANGED since the previous review.' || '' }}
            ${{ inputs.mode == 'requested' && 'REVIEWER SPECIAL INSTRUCTIONS (from the comment that triggered this re-review, may override default instructions):' || '' }}
            ${{ inputs.mode == 'requested' && github.event.comment.body || '' }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            Provide detailed feedback using inline comments for specific issues:
               - Only comment when the issue requires changes, or is particularly severe. Don't use inline comments for general feedback or compliments.
            ${{ steps.decide.outputs.is_rereview == 'true' && '  - Do not repeat comments from previous reviews. Comment only on issues related to new or modified code since the last review.' || '' }}
            ${{ steps.decide.outputs.is_rereview == 'true' && '  - Mark inline comments from previous reviews that are now addressed as resolved.' || '' }}

            YOU HAVE PERMISSION AND CAPABILITY to submit GitHub PR reviews using the `gh pr review` command.
            You MUST submit a review when your analysis is complete.

            Submit a gh review with status set to reflect your overall verdict:
              - Blocking issues present -> `gh pr review --request-changes`
              - No blocking issues -> `gh pr review --approve`
              - No body is required (general review comments should be placed in your tracking comment).

            IMPORTANT: Failure to set a review status will stall the entire PR workflow in this repository!
            Do NOT claim you cannot submit reviews - you have the tool permission and GitHub token to do so.

            IMPORTANT: Include this exact marker at the END of your summary comment (after the review):
            diff-hash:${{ steps.diff.outputs.diff_hash }}

            ${{ inputs.extra-instructions }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
